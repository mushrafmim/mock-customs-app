services:
  customs-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      - PORT=${PORT:-3001}
      - NSW_BACKEND_URL=${NSW_BACKEND_URL:-http://localhost:8080}
      - NEXT_PUBLIC_NSW_BACKEND_URL=${NEXT_PUBLIC_NSW_BACKEND_URL:-http://localhost:8080}
      - DB_PATH=/app/data/customs.db
    volumes:
      - customs_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3001}/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  customs_data:
